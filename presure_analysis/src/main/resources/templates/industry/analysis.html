<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校毕业生就业压力分析系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>行业需求分析</h1>
        </header>

        <nav class="navbar">
            <a href="/" class="nav-item">首页</a>
            <a href="/employment/analysis" class="nav-item">就业数据分析</a>
            <a href="/industry/analysis" class="nav-item active">行业需求分析</a>
            <a href="/pressure/analysis" class="nav-item">就业压力分析</a>
            <a href="/data/manage" class="nav-item">数据管理</a>
        </nav>

        <div class="charts-container">
            <div class="chart-box">
                <h2 class="chart-title">2025年各行业人才需求量</h2>
                <div id="industryDemandChart" class="chart"></div>
            </div>

            <div class="chart-box">
                <h2 class="chart-title">2025年各地区招聘需求</h2>
                <div id="locationDemandChart" class="chart"></div>
            </div>

            <div class="chart-box full-width">
                <h2 class="chart-title">2025年热门职位TOP15</h2>
                <div id="hotPositionsChart" class="chart" style="height: 500px;"></div>
            </div>
        </div>

        <footer class="footer">
            <p>高校毕业生就业压力分析系统</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadIndustryDemandChart();
            loadLocationDemandChart();
            loadHotPositionsChart();
        });

        function loadIndustryDemandChart() {
            axios.get('/system/industry/demand/industry?year=2025')
                .then(response => {
                    if (response.data.code === 200) {
                        const data = response.data.data;
                        const chart = echarts.init(document.getElementById('industryDemandChart'));
                        
                        const option = {
                            tooltip: {
                                trigger: 'item',
                                formatter: '{b}: {c}人 ({d}%)'
                            },
                            legend: {
                                orient: 'vertical',
                                right: '10%',
                                top: 'center'
                            },
                            series: [{
                                type: 'pie',
                                radius: ['40%', '70%'],
                                center: ['35%', '50%'],
                                data: data.map(item => ({
                                    name: item.industry,
                                    value: item.count
                                })),
                                emphasis: {
                                    itemStyle: {
                                        shadowBlur: 10,
                                        shadowOffsetX: 0,
                                        shadowColor: 'rgba(0, 0, 0, 0.5)'
                                    }
                                },
                                label: {
                                    formatter: '{b}\n{d}%'
                                }
                            }]
                        };
                        
                        chart.setOption(option);
                        window.addEventListener('resize', () => chart.resize());
                    }
                });
        }

        function loadLocationDemandChart() {
            axios.get('/system/industry/demand/location?year=2025')
                .then(response => {
                    if (response.data.code === 200) {
                        const data = response.data.data;
                        const chart = echarts.init(document.getElementById('locationDemandChart'));
                        
                        const option = {
                            tooltip: {
                                trigger: 'axis',
                                axisPointer: { type: 'shadow' }
                            },
                            xAxis: {
                                type: 'category',
                                data: data.map(item => item.location),
                                axisLabel: { interval: 0, rotate: 30 }
                            },
                            yAxis: {
                                type: 'value',
                                name: '需求人数'
                            },
                            series: [{
                                data: data.map(item => item.count),
                                type: 'bar',
                                itemStyle: {
                                    color: function(params) {
                                        const colorList = [
                                            '#5470c6', '#91cc75', '#fac858', '#ee6666',
                                            '#73c0de', '#3ba272', '#fc8452', '#9a60b4'
                                        ];
                                        return colorList[params.dataIndex % colorList.length];
                                    }
                                },
                                label: {
                                    show: true,
                                    position: 'top'
                                }
                            }],
                            grid: { bottom: '20%' }
                        };
                        
                        chart.setOption(option);
                        window.addEventListener('resize', () => chart.resize());
                    }
                });
        }

        function loadHotPositionsChart() {
            axios.get('/system/industry/hot/positions?year=2025')
                .then(response => {
                    if (response.data.code === 200) {
                        const data = response.data.data;
                        const chart = echarts.init(document.getElementById('hotPositionsChart'));
                        
                        const option = {
                            tooltip: {
                                trigger: 'axis',
                                axisPointer: { type: 'shadow' },
                                formatter: function(params) {
                                    const item = data[params[0].dataIndex];
                                    return `${params[0].name}<br/>` +
                                           `需求量: ${item.count}<br/>` +
                                           `平均薪资: ¥${parseFloat(item.salary).toFixed(0)}`;
                                }
                            },
                            xAxis: {
                                type: 'value',
                                name: '需求量',
                                position: 'top'
                            },
                            yAxis: {
                                type: 'category',
                                data: data.map(item => item.position),
                                inverse: true,
                                axisLabel: { interval: 0 }
                            },
                            series: [{
                                data: data.map(item => item.count),
                                type: 'bar',
                                itemStyle: {
                                    color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                        { offset: 0, color: '#667eea' },
                                        { offset: 1, color: '#764ba2' }
                                    ])
                                },
                                label: {
                                    show: true,
                                    position: 'right',
                                    formatter: '{c}'
                                }
                            }],
                            grid: { left: '20%', right: '15%', top: '10%', bottom: '10%' }
                        };
                        
                        chart.setOption(option);
                        window.addEventListener('resize', () => chart.resize());
                    }
                });
        }
    </script>
</body>
</html>
