<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校毕业生就业压力分析系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div class="container">
    <header class="header">
        <h1>数据管理</h1>
    </header>

    <nav class="navbar">
        <a href="/" class="nav-item">首页</a>
        <a href="/employment/analysis" class="nav-item">就业数据分析</a>
        <a href="/industry/analysis" class="nav-item">行业需求分析</a>
        <a href="/pressure/analysis" class="nav-item">就业压力分析</a>
        <a href="/data/manage" class="nav-item active">数据管理</a>
    </nav>

    <!-- 数据概览 -->
    <div style="padding: 30px;">
        <h2 style="color: #2c3e50; margin-bottom: 20px;">数据概览</h2>
        <div class="stats-container" style="background: white; padding: 20px;">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-content">
                    <h3 id="employmentCount">-</h3>
                    <p>就业数据条数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-content">
                    <h3 id="industryCount">-</h3>
                    <p>行业需求条数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-content">
                    <h3 id="pressureCount">-</h3>
                    <p>压力指标条数</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据采集控制 -->
    <div style="padding: 30px;">
        <h2 style="color: #2c3e50; margin-bottom: 20px;">数据采集控制</h2>
        <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08);">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">

                <div style="border: 2px solid #3498db; border-radius: 12px; padding: 20px;">
                    <h3 style="color: #3498db; margin-bottom: 15px;">就业数据采集</h3>
                    <p style="color: #7f8c8d; margin-bottom: 15px;">采集高校毕业生就业数据，包括就业率、薪资等信息</p>
                    <button onclick="startEmploymentCrawler()" class="action-btn" style="width: 100%;">
                        <span>启动采集</span>
                    </button>
                    <div id="employmentStatus" style="margin-top: 10px; padding: 10px; background: #ecf0f1; border-radius: 8px; font-size: 0.9em; display: none;">
                        <span id="employmentStatusText">准备就绪</span>
                    </div>
                </div>

                <div style="border: 2px solid #e74c3c; border-radius: 12px; padding: 20px;">
                    <h3 style="color: #e74c3c; margin-bottom: 15px;">行业需求采集</h3>
                    <p style="color: #7f8c8d; margin-bottom: 15px;">采集各行业人才需求数据，包括岗位、薪资等信息</p>
                    <button onclick="startIndustryCrawler()" class="action-btn" style="width: 100%; background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);">
                        <span>启动采集</span>
                    </button>
                    <div id="industryStatus" style="margin-top: 10px; padding: 10px; background: #ecf0f1; border-radius: 8px; font-size: 0.9em; display: none;">
                        <span id="industryStatusText">准备就绪</span>
                    </div>
                </div>

            </div>

            <div style="margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 12px; border-left: 5px solid #ffc107;">
                <h4 style="color: #856404; margin-bottom: 10px;">注意事项</h4>
                <ul style="color: #856404; margin: 0; padding-left: 20px;">
                    <li>数据采集可能需要几分钟时间，请耐心等待</li>
                    <li>当前使用模拟数据生成，实际应用需配置真实数据源</li>
                    <li>采集过程中请勿关闭页面</li>
                    <li>建议在非高峰时段进行数据采集</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 数据查询 -->
    <div style="padding: 30px;">
        <h2 style="color: #2c3e50; margin-bottom: 20px;">数据查询</h2>
        <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08);">

            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; margin-right: 10px;">大学名称:</label>
                <input type="text" id="universityInput" placeholder="如：清华大学" style="padding: 8px 15px; border: 2px solid #ddd; border-radius: 8px; width: 200px;">

                <label style="font-weight: bold; margin: 0 10px 0 20px;">专业名称:</label>
                <input type="text" id="majorInput" placeholder="如：计算机科学与技术" style="padding: 8px 15px; border: 2px solid #ddd; border-radius: 8px; width: 200px;">

                <label style="font-weight: bold; margin: 0 10px 0 20px;">年份:</label>
                <select id="yearSelect" style="padding: 8px 15px; border: 2px solid #ddd; border-radius: 8px;">
                    <option value="">全部</option>
                    <option value="2025" selected>2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                </select>

                <button onclick="searchData()" style="padding: 8px 25px; margin-left: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer;">
                    查询
                </button>
            </div>

            <div id="searchResults" style="margin-top: 20px; max-height: 400px; overflow-y: auto;">
                <p style="color: #7f8c8d; text-align: center; padding: 40px;">点击"查询"按钮查看数据</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2025 高校毕业生就业压力分析系统</p>
    </footer>
</div>

<script>
    // 页面加载时获取数据统计
    document.addEventListener('DOMContentLoaded', function() {
        loadDataStatistics();
    });

    // 加载数据统计
    function loadDataStatistics() {
        // 这里简化处理，实际应该有专门的统计接口
        document.getElementById('employmentCount').textContent = '800+';
        document.getElementById('industryCount').textContent = '500+';
        document.getElementById('pressureCount').textContent = '35+';
    }

    // 启动就业数据采集
    function startEmploymentCrawler() {
        const statusDiv = document.getElementById('employmentStatus');
        const statusText = document.getElementById('employmentStatusText');

        statusDiv.style.display = 'block';
        statusDiv.style.background = '#3498db';
        statusDiv.style.color = 'white';
        statusText.textContent = '正在采集数据...';

        axios.post('/crawler/employment/start')
            .then(response => {
                statusDiv.style.background = '#27ae60';
                statusText.textContent = '采集成功: ' + response.data.msg;
                setTimeout(() => {
                    loadDataStatistics();
                }, 2000);
            })
            .catch(error => {
                statusDiv.style.background = '#e74c3c';
                statusText.textContent = '采集失败: ' + (error.response?.data?.msg || error.message);
            });
    }

    // 启动行业需求采集
    function startIndustryCrawler() {
        const statusDiv = document.getElementById('industryStatus');
        const statusText = document.getElementById('industryStatusText');

        statusDiv.style.display = 'block';
        statusDiv.style.background = '#e74c3c';
        statusDiv.style.color = 'white';
        statusText.textContent = '正在采集数据...';

        axios.post('/crawler/industry/start')
            .then(response => {
                statusDiv.style.background = '#27ae60';
                statusText.textContent = '采集成功: ' + response.data.msg;
                setTimeout(() => {
                    loadDataStatistics();
                }, 2000);
            })
            .catch(error => {
                statusDiv.style.background = '#e74c3c';
                statusText.textContent = '采集失败: ' + (error.response?.data?.msg || error.message);
            });
    }

    // 查询数据
    function searchData() {
        const university = document.getElementById('universityInput').value.trim();
        const major = document.getElementById('majorInput').value.trim();
        const year = document.getElementById('yearSelect').value;

        let url = '/system/employment/list?';
        if (university) url += 'universityName=' + encodeURIComponent(university) + '&';
        if (major) url += 'majorName=' + encodeURIComponent(major) + '&';
        if (year) url += 'graduationYear=' + year;

        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<p style="text-align: center; color: #3498db;">查询中...</p>';

        axios.get(url)
            .then(response => {
                if (response.data.code === 200) {
                    const data = response.data.data;

                    if (data.length === 0) {
                        resultsDiv.innerHTML = '<p style="text-align: center; color: #7f8c8d;">未找到符合条件的数据</p>';
                        return;
                    }

                    let html = '<table class="data-table"><thead><tr>' +
                        '<th>大学</th><th>专业</th><th>年份</th><th>就业率(%)</th><th>平均薪资(元)</th>' +
                        '<th>毕业生人数</th><th>已就业人数</th>' +
                        '</tr></thead><tbody>';

                    data.forEach(item => {
                        html += `<tr>
                            <td>${item.universityName}</td>
                            <td>${item.majorName}</td>
                            <td>${item.graduationYear}</td>
                            <td>${item.employmentRate}</td>
                            <td>${item.averageSalary}</td>
                            <td>${item.graduateCount}</td>
                            <td>${item.employedCount}</td>
                        </tr>`;
                    });

                    html += '</tbody></table>';
                    resultsDiv.innerHTML = html;
                }
            })
            .catch(error => {
                resultsDiv.innerHTML = '<p style="text-align: center; color: #e74c3c;">查询失败: ' + error.message + '</p>';
            });
    }
</script>
</body>
</html>
